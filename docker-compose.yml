services:
  educard:
    image: educard-sandbox-lab:latest
    build: .
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=8787
    networks:
      - RenaceNet
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.swarm.network=RenaceNet"
        - "traefik.http.routers.rober-secure.rule=Host(`rober.renace.tech`)"
        - "traefik.http.routers.rober-secure.entrypoints=websecure"
        - "traefik.http.routers.rober-secure.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.rober-educard.loadbalancer.server.port=8787"
        - "traefik.http.routers.rober-http.rule=Host(`rober.renace.tech`)"
        - "traefik.http.routers.rober-http.entrypoints=web"
        - "traefik.http.routers.rober-http.middlewares=rober-https-redirect"
        - "traefik.http.middlewares.rober-https-redirect.redirectscheme.scheme=https"

networks:
  RenaceNet:
    external: true
